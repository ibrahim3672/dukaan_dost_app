                        "inverse-on-surface": "#f1f1f1",
                        "surface-variant": "#e2e2e2",
                        "primary-fixed": "#a3f69c",
                        "error": "#ba1a1a",
                        "surface": "#f9f9f9",
                        "inverse-primary": "#88d982",
                        "background": "#f9f9f9",
                        "surface-container-low": "#f3f3f3",
                        "primary-container": "#2e7d32",
                        "tertiary-fixed": "#abf4ac",
                        "outline": "#707a6c",

                        "on-tertiary-fixed": "#002107",
                        "on-surface-variant": "#40493d",

                    "spacing": {

                        "lg": "24px",
                        "gutter": "12px",

                        "sm": "8px",

                        "xs": "4px"

                    "fontFamily": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mic-pulse {
            box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 40px rgba(46, 125, 50, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white dark:bg-stone-950 border-b border-stone-200 dark:border-stone-800 shadow-sm dark:shadow-none sticky top-0 z-50 w-full">
<div class="flex justify-between items-center w-full px-4 h-16 max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-green-800 dark:text-green-500" data-icon="storefront">storefront</span>
<h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-xl font-black text-green-800 dark:text-green-400">DukanDost</h1>
</div>
<button class="bg-stone-100 dark:bg-stone-800 px-3 py-1.5 rounded-lg font-label-lg text-secondary active:scale-95 duration-150 transition-colors">
                EN/اردو
            </button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col px-margin-edge py-lg max-w-screen-xl mx-auto w-full gap-lg">
<!-- Speech Recognition Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_2px_4px_rgba(0,0,0,0.04)] p-lg flex flex-col gap-md text-center">
<span class="text-secondary font-label-lg uppercase tracking-wider">Recognized Text</span>
<div class="min-h-[120px] flex items-center justify-center border-2 border-dashed border-outline-variant rounded-lg p-md">
<p class="font-urdu-body text-urdu-body text-on-surface-variant leading-relaxed" dir="rtl">
                    احمد نے 2 کلو آٹا لیا 200 روپے میں
                </p>
</div>
</section>
<!-- Voice Interaction Area -->
<section class="flex-1 flex flex-col items-center justify-center gap-xl py-xl">
<div class="relative">
<!-- Pulsing Background Layers -->
<div class="absolute inset-0 bg-primary/10 rounded-full animate-ping scale-150"></div>
<!-- Main Mic Button -->
<button class="relative z-10 w-[140px] h-[140px] bg-primary text-on-primary rounded-full flex items-center justify-center shadow-xl mic-pulse transition-transform active:scale-90">
<span class="material-symbols-outlined !text-6xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<div class="text-center space-y-sm max-w-sm">
<p class="font-urdu-body text-on-surface text-urdu-body" dir="rtl">
                    بولیں: <span class="text-primary font-bold">"احمد نے 2 کلو آٹا لیا 200 روپے میں"</span>
</p>
<p class="font-body-md text-outline">
                    Say: <span class="text-primary font-semibold">"Ahmed bought 2kg flour for 200 rupees"</span>
</p>
</div><button class="mt-md px-lg py-2 border-2 border-outline-variant text-on-surface-variant rounded-full font-label-lg flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined !text-[20px]" data-icon="keyboard">keyboard</span>
<div class="flex flex-col items-center">
<span class="font-urdu-body text-[14px] leading-tight">دستی اندراج</span>
<span class="text-[10px] leading-tight uppercase tracking-tighter">Manual Entry</span>
</div>
</button>
</section>
<!-- Action Button -->
<div class="pb-xl">
<button class="w-full h-button-height bg-primary text-on-primary font-headline-md rounded-xl shadow-lg hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span>Confirm Selection</span>
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-stone-950 border-t border-stone-200 dark:border-stone-800 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] rounded-t-2xl z-50 flex justify-around items-center px-2 py-3 h-20">
<!-- Dashboard -->
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-3 py-1.5 hover:bg-stone-50 dark:hover:bg-stone-900 transition-colors">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[12px] font-medium">Dashboard</span>
</button>
<!-- Udhaar -->
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-3 py-1.5 hover:bg-stone-50 dark:hover:bg-stone-900 transition-colors">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-['Inter'] text-[12px] font-medium">Udhaar</span>
</button>
<!-- Voice (ACTIVE) -->
<button class="flex flex-col items-center justify-center bg-green-50 dark:bg-green-900/30 text-green-800 dark:text-green-300 rounded-xl px-3 py-1.5">
<span class="material-symbols-outlined" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-['Inter'] text-[12px] font-bold">Voice</span>
</button>
<!-- Stock -->
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-3 py-1.5 hover:bg-stone-50 dark:hover:bg-stone-900 transition-colors">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-['Inter'] text-[12px] font-medium">Stock</span>
</button>
<!-- Reports -->
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-3 py-1.5 hover:bg-stone-50 dark:hover:bg-stone-900 transition-colors">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-['Inter'] text-[12px] font-medium">Reports</span>
</button>
</nav>
<!-- Visual Polish: Background Decor -->

</div>
</body></html>

<!DOCTYPE html><html dir="ltr" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Noto+Naskh+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#707a6c",
                    "on-surface": "#1a1c1c",
                    "on-secondary-container": "#307231",
                    "surface-container-low": "#f3f3f3",
                    "background": "#f9f9f9",
                    "tertiary-fixed": "#abf4ac",
                    "primary-container": "#2e7d32",
                    "on-error": "#ffffff",
                    "on-secondary-fixed": "#002203",
                    "surface-container": "#eeeeee",
                    "secondary-fixed-dim": "#91d78a",
                    "on-primary-container": "#cbffc2",
                    "surface-dim": "#dadada",
                    "on-surface-variant": "#40493d",
                    "outline-variant": "#bfcaba",
                    "on-tertiary-fixed": "#002107",
                    "inverse-surface": "#2f3131",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#88d982",
                    "on-primary-fixed": "#002204",
                    "on-primary-fixed-variant": "#005312",
                    "tertiary": "#1d622b",
                    "error-container": "#ffdad6",
                    "secondary": "#2a6b2c",
                    "surface-tint": "#1b6d24",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#387b41",
                    "surface-container-high": "#e8e8e8",
                    "secondary-container": "#acf4a4",
                    "on-secondary-fixed-variant": "#0c5216",
                    "secondary-fixed": "#acf4a4",
                    "surface-bright": "#f9f9f9",
                    "tertiary-fixed-dim": "#90d792",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#0d631b",
                    "on-tertiary-container": "#c7ffc5",
                    "on-secondary": "#ffffff",
                    "on-background": "#1a1c1c",
                    "surface-container-highest": "#e2e2e2",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f1f1f1",
                    "surface-variant": "#e2e2e2",
                    "on-tertiary-fixed-variant": "#07521d",
                    "surface": "#f9f9f9",
                    "inverse-primary": "#88d982",
                    "error": "#ba1a1a",
                    "primary-fixed": "#a3f69c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "gutter": "12px",
                    "xl": "32px",
                    "unit": "4px",
                    "lg": "24px",
                    "xs": "4px",
                    "margin-edge": "16px",
                    "touch-target-min": "48px",
                    "button-height": "56px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "urdu-body": ["Noto Naskh Arabic"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "urdu-body": ["20px", {"lineHeight": "32px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-on-background">
<!-- TopAppBar -->
<header class="bg-white sticky top-0 z-50 border-b border-stone-200 shadow-sm">
<div class="flex justify-between items-center w-full px-4 h-16 max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-green-800" data-icon="arrow_back">arrow_back</span>
<h1 class="font-headline-md text-green-800">Manual Entry</h1>
</div>
<button class="bg-stone-100 hover:bg-stone-200 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors duration-150 active:scale-95">
                EN/اردو
            </button>
</div>
</header>
<main class="max-w-xl mx-auto px-margin-edge py-lg pb-32">
<!-- Sale/Purchase Toggle -->
<div class="bg-surface-container p-1 rounded-xl flex items-center mb-lg">
<button class="flex-1 py-3 px-4 rounded-lg bg-white shadow-sm text-primary font-bold transition-all duration-150 active:scale-95 flex flex-col items-center">
<span class="text-label-lg">Sale</span>
<span class="font-urdu-body text-[14px]">بیچیں</span>
</button>
<button class="flex-1 py-3 px-4 rounded-lg text-on-surface-variant font-medium transition-all duration-150 active:scale-95 flex flex-col items-center">
<span class="text-label-lg">Purchase</span>
<span class="font-urdu-body text-[14px]">خریدیں</span>
</button>
</div>
<!-- Entry Form -->
<div class="space-y-md">
<!-- Product Name -->
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="font-label-lg text-on-surface">Product Name</label>
<span class="font-urdu-body text-[14px] text-on-surface-variant">آئٹم کا نام</span>
</div>
<div class="relative group">
<input class="w-full h-button-height bg-white border-2 border-stone-200 rounded-xl px-4 focus:border-primary focus:ring-0 transition-all outline-none" placeholder="Enter product name..." type="text">
</div>
</div>
<!-- Quantity & Unit Picker -->
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="font-label-lg text-on-surface">Quantity</label>
<span class="font-urdu-body text-[14px] text-on-surface-variant">مقدار</span>
</div>
<div class="flex gap-2">
<input class="flex-1 h-button-height bg-white border-2 border-stone-200 rounded-xl px-4 focus:border-primary focus:ring-0 transition-all outline-none" placeholder="0.00" type="number">
<select class="w-32 h-button-height bg-stone-100 border-2 border-stone-100 rounded-xl px-4 font-label-lg focus:bg-white focus:border-primary focus:ring-0 transition-all outline-none">
<option>kg</option>
<option>pcs</option>
<option>ltr</option>
<option>box</option>
</select>
</div>
</div>
<!-- Price -->
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="font-label-lg text-on-surface">Price (Per Unit)</label>
<span class="font-urdu-body text-[14px] text-on-surface-variant">قیمت</span>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">Rs.</span>
<input class="w-full h-button-height bg-white border-2 border-stone-200 rounded-xl pl-12 pr-4 focus:border-primary focus:ring-0 transition-all outline-none" placeholder="10" type="number">
</div>
</div>
<!-- Supplier/Customer -->
<div class="space-y-2">
<div class="flex justify-between items-baseline"><label class="font-label-lg text-on-surface">Customer / Supplier <span class="text-stone-400 font-normal">(Optional)</span></label>
<div class="flex items-center gap-2">
<button class="text-primary text-xs font-bold flex items-center gap-1 hover:bg-primary/5 px-2 py-1 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[18px]">add_circle</span>
<span class="">Add New</span>
</button>
<span class="font-urdu-body text-[14px] text-on-surface-variant">کسٹمر / سپلائر</span>
</div></div>
<input class="w-full h-button-height bg-white border-2 border-stone-200 rounded-xl px-4 focus:border-primary focus:ring-0 transition-all outline-none" placeholder="Search or add name..." type="text">
</div>
<!-- Calculation Card -->
<!-- Payment Status Toggle -->
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="font-label-lg text-on-surface">Payment Status</label>
<span class="font-urdu-body text-[14px] text-on-surface-variant">ادائیگی کی صورتحال</span>
</div>
<div class="grid grid-cols-2 gap-2 bg-surface-container-low p-1 rounded-xl">
<button class="flex flex-col items-center py-2 rounded-lg bg-white shadow-sm ring-1 ring-black/5 text-primary transition-all">
<span class="text-label-lg">Paid</span>
<span class="font-urdu-body text-[12px]">ادائیگی ہو گئی</span>
</button>
<button class="flex flex-col items-center py-2 rounded-lg text-on-surface-variant hover:bg-white/50 transition-all">
<span class="text-label-lg">Pending (Udhaar)</span>
<span class="font-urdu-body text-[12px]">قرض / ادھار</span>
</button>
</div>
</div><div class="bg-primary-container p-lg rounded-xl shadow-md flex items-center justify-between">
<div>
<p class="text-on-primary-container/80 text-label-lg">Total Amount</p>
<p class="font-urdu-body text-white/80 text-[12px]">کل رقم</p>
</div>
<div class="text-right">
<p class="text-on-primary-container font-headline-md">Rs. 0.00</p>
<p class="text-on-primary-container/60 text-xs font-medium">Auto-calculated</p>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[56px] bg-primary text-white font-bold rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="save">save</span>
<div class="flex flex-col items-center leading-tight">
<span class="">Save Record</span>
<span class="font-urdu-body text-[14px] font-normal">ریکارڈ محفوظ کریں</span>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] h-20 px-2 py-3 z-50 rounded-t-2xl">
<div class="flex justify-around items-center w-full max-w-screen-xl mx-auto h-full">
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5 transition-all">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[12px] font-medium">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5 transition-all">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-['Inter'] text-[12px] font-medium">Udhaar</span>
</div>
<div class="flex flex-col items-center justify-center bg-green-50 text-green-800 rounded-xl px-3 py-1.5 ring-1 ring-green-200">
<span class="material-symbols-outlined" data-icon="mic" style="font-variation-settings: &quot;FILL&quot; 1;">mic</span>
<span class="font-['Inter'] text-[12px] font-bold">Voice</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5 transition-all">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-['Inter'] text-[12px] font-medium">Stock</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5 transition-all">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-['Inter'] text-[12px] font-medium">Reports</span>
</div>
</div>
</nav>
<!-- Asymmetric Background Accent -->
<div class="fixed top-0 right-0 -z-10 opacity-10">
<!-- Payment Status Toggle -->
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="font-label-lg text-on-surface">Payment Status</label>
<span class="font-urdu-body text-[14px] text-on-surface-variant">ادائیگی کی صورتحال</span>
</div>
<div class="grid grid-cols-2 gap-2 bg-surface-container-low p-1 rounded-xl">
<button class="flex flex-col items-center py-2 rounded-lg bg-white shadow-sm ring-1 ring-black/5 text-primary transition-all">
<span class="text-label-lg">Paid</span>
<span class="font-urdu-body text-[12px]">ادائیگی ہو گئی</span>
</button>
<button class="flex flex-col items-center py-2 rounded-lg text-on-surface-variant hover:bg-white/50 transition-all">
<span class="text-label-lg">Pending (Udhaar)</span>
<span class="font-urdu-body text-[12px]">قرض / ادھار</span>
</button>
</div>
</div><div class="w-96 h-96 bg-primary-container rounded-full blur-[80px] -mr-48 -mt-48"></div>
</div>


</body></html>
